version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agentic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/agentic_db
      - DATABASE_SYNC_URL=postgresql+psycopg://admin:password@db:5432/agentic_db
      # OPENAI_API_KEY will be pulled from an .env file on the host automatically by docker-compose
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env

volumes:
  postgres_data:
